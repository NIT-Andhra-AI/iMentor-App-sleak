name: Cleanup Old Build Artifacts

on:
  schedule:
    - cron: "20 2 * * *"
  workflow_dispatch:

permissions:
  actions: write

jobs:
  cleanup:
    name: Delete stale workflow artifacts
    runs-on: ubuntu-22.04
    steps:
      - name: Remove artifacts older than 14 days
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const maxAgeDays = 14;
            const cutoff = Date.now() - maxAgeDays * 24 * 60 * 60 * 1000;

            let page = 1;
            let deleted = 0;

            while (true) {
              const { data } = await github.rest.actions.listArtifactsForRepo({
                owner,
                repo,
                per_page: 100,
                page,
              });

              if (!data.artifacts.length) break;

              for (const artifact of data.artifacts) {
                const created = new Date(artifact.created_at).getTime();
                if (created < cutoff) {
                  await github.rest.actions.deleteArtifact({
                    owner,
                    repo,
                    artifact_id: artifact.id,
                  });
                  deleted += 1;
                  core.info(`Deleted artifact ${artifact.name} (${artifact.id})`);
                }
              }

              if (data.artifacts.length < 100) break;
              page += 1;
            }

            core.notice(`Cleanup complete. Deleted ${deleted} artifact(s).`);
