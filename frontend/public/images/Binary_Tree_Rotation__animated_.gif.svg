<svg viewBox="0 0 640 380" width="640" height="380" xmlns="http://www.w3.org/2000/svg">
  <title>AVL Tree — Left and Right Rotation</title>
  <style>
    .bg{fill:#f8fafc}
    text{font-family:system-ui,sans-serif;fill:#1e293b;text-anchor:middle;dominant-baseline:middle}
    .title{font-size:18px;font-weight:bold;fill:#0369a1}
    .node{fill:#dbeafe;stroke:#2563eb;stroke-width:2}
    .pivot{fill:#fef9c3;stroke:#d97706;stroke-width:2.5}
    .edge{stroke:#64748b;stroke-width:1.5}
    .label{font-size:13px;font-weight:bold}
    .small{font-size:11px;fill:#475569}
    .caption{font-size:12px;font-weight:bold;fill:#0369a1}
    .rot-arrow{stroke:#dc2626;stroke-width:2.5;fill:none;marker-end:url(#ra)}
  </style>
  <defs>
    <marker id="ra" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#dc2626"/>
    </marker>
  </defs>
  <rect class="bg" width="640" height="380"/>
  <text class="title" x="320" y="24">AVL Tree — Left &amp; Right Rotation</text>

  <!-- ====== LEFT ROTATION (right side heavy) ====== -->
  <!-- BEFORE left rotation -->
  <text class="caption" x="115" y="55">Before (right-heavy)</text>
  <!-- root A -->
  <line class="edge" x1="115" y1="95" x2="155" y2="155"/>
  <circle class="pivot" cx="115" cy="80" r="22"/>
  <text class="label" x="115" y="80">A</text>
  <text class="small" x="115" y="107">pivot</text>
  <!-- B -->
  <line class="edge" x1="155" y1="155" x2="195" y2="215"/>
  <circle class="node" cx="155" cy="155" r="22"/>
  <text class="label" x="155" y="155">B</text>
  <!-- C -->
  <circle class="node" cx="195" cy="215" r="22"/>
  <text class="label" x="195" y="215">C</text>

  <!-- Left rotation arrow -->
  <path class="rot-arrow" d="M210 80 Q260 55 260 130 Q260 165 240 165" />
  <text font-size="12" fill="#dc2626" x="280" y="105">Left</text>
  <text font-size="12" fill="#dc2626" x="280" y="120">Rotate</text>

  <!-- AFTER left rotation -->
  <text class="caption" x="380" y="55">After left rotation</text>
  <!-- new root B -->
  <line class="edge" x1="350" y1="95" x2="310" y2="155"/>
  <line class="edge" x1="350" y1="95" x2="390" y2="155"/>
  <circle class="node" cx="350" cy="80" r="22"/>
  <text class="label" x="350" y="80">B</text>
  <!-- A becomes left child -->
  <circle class="pivot" cx="310" cy="155" r="22"/>
  <text class="label" x="310" y="155">A</text>
  <!-- C stays right -->
  <circle class="node" cx="390" cy="155" r="22"/>
  <text class="label" x="390" y="155">C</text>

  <!-- ====== RIGHT ROTATION (left side heavy) ====== -->
  <line x1="20" y1="265" x2="620" y2="265" stroke="#e2e8f0" stroke-width="1"/>
  <text class="title" x="320" y="285" font-size="15">Right Rotation — Mirror Operation</text>

  <!-- BEFORE right rotation -->
  <text class="caption" x="120" y="308">Before (left-heavy)</text>
  <!-- root C -->
  <line class="edge" x1="120" y1="342" x2="80" y2="362"/>
  <circle class="pivot" cx="120" cy="330" r="20"/>
  <text class="label" x="120" y="330">C</text>
  <!-- B left child -->
  <line class="edge" x1="80" y1="355" x2="55" y2="375"/>
  <circle class="node" cx="80" cy="360" r="20"/>
  <text class="label" x="80" y="360">B</text>
  <!-- A -->
  <circle class="node" cx="55" cy="375" r="14"/>
  <text class="label" x="55" y="375" font-size="11">A</text>

  <!-- right rotation arrow -->
  <path class="rot-arrow" d="M195 330 Q240 310 240 348 Q240 360 220 360" />
  <text font-size="12" fill="#dc2626" x="265" y="330">Right</text>
  <text font-size="12" fill="#dc2626" x="265" y="344">Rotate</text>

  <!-- AFTER right rotation: B becomes root -->
  <text class="caption" x="380" y="308">After right rotation</text>
  <line class="edge" x1="380" y1="342" x2="340" y2="362"/>
  <line class="edge" x1="380" y1="342" x2="420" y2="362"/>
  <circle class="node" cx="380" cy="330" r="20"/>
  <text class="label" x="380" y="330">B</text>
  <circle class="node" cx="340" cy="362" r="20"/>
  <text class="label" x="340" y="362">A</text>
  <circle class="pivot" cx="420" cy="362" r="20"/>
  <text class="label" x="420" y="362">C</text>

  <text font-size="11" fill="#64748b" x="320" y="372">Rotations restore balance factor ∈ {-1, 0, 1} after insert/delete</text>
</svg>
