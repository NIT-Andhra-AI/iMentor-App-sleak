<svg viewBox="0 0 640 360" width="640" height="360" xmlns="http://www.w3.org/2000/svg">
    <title>Gradient Descent</title>
    <desc>An animation showing a ball rolling down a loss surface to find the minimum, representing the Gradient Descent optimization algorithm.</desc>
    <style>
        .bg { fill: #f8fafc; }
        .loss-surface { fill: none; stroke: #8b5cf6; stroke-width: 4; }
        .ball { fill: #10b981; }
        .title { font-family: system-ui, sans-serif; font-size: 24px; text-anchor: middle; fill: #334155; }
        .desc-text { font-family: system-ui, sans-serif; font-size: 16px; text-anchor: middle; fill: #475569; }
        .axis-label { font-family: system-ui, sans-serif; font-size: 14px; text-anchor: middle; fill: #64748b; }

        .ball-path {
            animation: roll-down 8s infinite ease-in-out;
        }

        @keyframes roll-down {
            0% { transform: translate(100px, 130px); }
            15% { transform: translate(150px, 158px); }
            30% { transform: translate(220px, 203px); }
            45% { transform: translate(280px, 233px); }
            60% { transform: translate(320px, 245px); }
            75% { transform: translate(340px, 248px); }
            90% { transform: translate(350px, 250px); }
            100% { transform: translate(350px, 250px); }
        }
    </style>
    <rect width="640" height="360" class="bg" />
    <text x="320" y="30" class="title">Gradient Descent</text>
    <text x="320" y="55" class="desc-text">Iteratively moving towards the minimum of a loss function.</text>

    <!-- Loss Surface and Axes -->
    <g transform="translate(0, -20)">
        <path class="loss-surface" d="M 50,150 Q 200,350 350,250 T 590,200" />
        <line x1="50" y1="320" x2="590" y2="320" stroke="#94a3b8" stroke-width="2" />
        <line x1="50" y1="100" x2="50" y2="320" stroke="#94a3b8" stroke-width="2" />
        <text x="320" y="340" class="axis-label">Parameter (Weight)</text>
        <text x="30" y="210" transform="rotate(-90, 30, 210)" class="axis-label">Loss / Cost</text>
        <text x="350" y="275" class="axis-label">Minimum</text>
        <path d="M 350 255 L 350 265" stroke="#10b981" stroke-width="2"/>
    </g>

    <!-- Ball -->
    <g class="ball-path">
        <circle class="ball" r="10" />
    </g>
</svg>