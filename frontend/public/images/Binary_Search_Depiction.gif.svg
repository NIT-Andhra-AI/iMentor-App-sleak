<svg viewBox="0 0 640 360" width="640" height="360" xmlns="http://www.w3.org/2000/svg">
    <title>Binary Search</title>
    <desc>An animation of the Binary Search algorithm, showing the search space narrowing by adjusting left, mid, and right pointers. Target: 23.</desc>
    <style>
        .bg { fill: #f8fafc; }
        .box { stroke: #94a3b8; stroke-width: 1; fill: #e2e8f0; transition: fill 0.5s; }
        .text { font-family: system-ui, sans-serif; font-size: 18px; text-anchor: middle; dominant-baseline: middle; fill: #1e293b; }
        .title { font-family: system-ui, sans-serif; font-size: 24px; text-anchor: middle; fill: #334155; }
        .desc-text { font-family: system-ui, sans-serif; font-size: 16px; text-anchor: middle; fill: #475569; }
        .pointer { font-family: system-ui, sans-serif; font-size: 14px; text-anchor: middle; transition: transform 1s ease-in-out; }
        
        .left-ptr { fill: #2563eb; animation: move-left 8s infinite; }
        .right-ptr { fill: #be185d; animation: move-right 8s infinite; }
        .mid-ptr { fill: #16a34a; animation: move-mid 8s infinite; }
        
        .box-container > .box { animation: box-color 8s infinite; }
        .box-container > #box-6 { animation: found-color 8s infinite; }

        @keyframes move-left {
            0%, 20% { transform: translateX(25px); }
            30%, 50% { transform: translateX(225px); } /* mid + 1 */
            60%, 100% { transform: translateX(275px); } /* mid + 1 */
        }
        @keyframes move-right {
            0%, 20% { transform: translateX(425px); }
            30%, 50% { transform: translateX(425px); }
            60%, 100% { transform: translateX(325px); } /* mid - 1 */
        }
        @keyframes move-mid {
            0%, 20% { transform: translateX(225px); }
            30%, 50% { transform: translateX(325px); }
            60%, 100% { transform: translateX(275px); }
        }

        @keyframes box-color {
            20% { fill: #cffafe; } /* Mid at 4 highlights */
            50% { fill: #fce7f3; } /* Mid at 6 highlights */
            80% { fill: #e2e8f0; }
        }
        @keyframes found-color {
            80%, 100% { fill: #a7f3d0; } /* Found at 5 */
        }
    </style>
    <rect width="640" height="360" class="bg" />
    <text x="320" y="30" class="title">Binary Search</text>
    <text x="320" y="55" class="desc-text">Searching for a target (23) in a sorted array.</text>

    <g class="box-container" transform="translate(70, 150)">
        <rect class="box" x="0" y="0" width="50" height="50"><animate attributeName="fill" from="#e2e8f0" to="#f3f4f6" dur="1s" begin="2.5s;10.5s" fill="freeze" /></rect><text class="text" x="25" y="25">2</text>
        <rect class="box" x="50" y="0" width="50" height="50"><animate attributeName="fill" from="#e2e8f0" to="#f3f4f6" dur="1s" begin="2.5s;10.5s" fill="freeze" /></rect><text class="text" x="75" y="25">5</text>
        <rect class="box" x="100" y="0" width="50" height="50"><animate attributeName="fill" from="#e2e8f0" to="#f3f4f6" dur="1s" begin="2.5s;10.5s" fill="freeze" /></rect><text class="text" x="125" y="25">8</text>
        <rect class="box" id="box-4" x="150" y="0" width="50" height="50"><animate attributeName="fill" from="#e2e8f0" to="#f3f4f6" dur="1s" begin="2.5s;10.5s" fill="freeze" /></rect><text class="text" x="175" y="25">12</text>
        
        <rect class="box" id="box-5" x="200" y="0" width="50" height="50" /><text class="text" x="225" y="25">16</text>
        <rect class="box" id="box-6" x="250" y="0" width="50" height="50" /><text class="text" x="275" y="25">23</text>
        <rect class="box" id="box-7" x="300" y="0" width="50" height="50" /><text class="text" x="325" y="25">38</text>
        <rect class="box" id="box-8" x="350" y="0" width="50" height="50" /><text class="text" x="375" y="25">56</text>
        <rect class="box" id="box-9" x="400" y="0" width="50" height="50" /><text class="text" x="425" y="25">72</text>
        <rect class="box" id="box-10" x="450" y="0" width="50" height="50" /><text class="text" x="475" y="25">91</text>
    </g>

    <g transform="translate(70, 120)">
        <g class="left-ptr"><text class="pointer">L</text><path d="M 0 0 L 0 15" stroke="#2563eb" stroke-width="2"/></g>
        <g class="mid-ptr"><text class="pointer">M</text><path d="M 0 0 L 0 15" stroke="#16a34a" stroke-width="2"/></g>
        <g class="right-ptr"><text class="pointer">R</text><path d="M 0 0 L 0 15" stroke="#be185d" stroke-width="2"/></g>
    </g>
</svg>