<svg viewBox="0 0 640 360" width="640" height="360" xmlns="http://www.w3.org/2000/svg">
  <title>OOP Polymorphism</title>
  <style>
    .bg{fill:#f8fafc}
    text{font-family:system-ui,sans-serif;fill:#1e293b;text-anchor:middle;dominant-baseline:middle}
    .title{font-size:19px;font-weight:bold;fill:#7c3aed}
    .cls{fill:#ede9fe;stroke:#7c3aed;stroke-width:2;rx:6}
    .sub{fill:#dbeafe;stroke:#2563eb;stroke-width:2;rx:6}
    .method{fill:#f1f5f9;stroke:#94a3b8;stroke-width:1}
    .edge{stroke:#7c3aed;stroke-width:2;fill:none;marker-end:url(#tri)}
    .label{font-size:13px;font-weight:bold}
    .small{font-size:11px;fill:#475569}
    .call{fill:#fef9c3;stroke:#d97706;stroke-width:1.5;rx:4}
  </style>
  <defs>
    <marker id="tri" markerWidth="8" markerHeight="6" refX="4" refY="3" orient="auto"><polygon points="0 0,0 6,8 3" fill="none" stroke="#7c3aed" stroke-width="1.5"/></marker>
  </defs>
  <rect class="bg" width="640" height="360"/>
  <text class="title" x="320" y="24">OOP Polymorphism — Same Interface, Different Behavior</text>

  <!-- Base class Animal -->
  <rect class="cls" x="220" y="50" width="200" height="90" rx="6"/>
  <text class="label" x="320" y="70" fill="#7c3aed">Animal (abstract)</text>
  <line x1="220" y1="82" x2="420" y2="82" stroke="#7c3aed" stroke-width="1"/>
  <text class="small" x="320" y="96">name: string</text>
  <line x1="220" y1="108" x2="420" y2="108" stroke="#7c3aed" stroke-width="1"/>
  <text class="small" x="320" y="122" font-style="italic">+ speak(): string</text>

  <!-- Dog subclass -->
  <rect class="sub" x="60" y="210" width="180" height="90" rx="6"/>
  <text class="label" x="150" y="230">Dog</text>
  <line x1="60" y1="242" x2="240" y2="242" stroke="#2563eb" stroke-width="1"/>
  <text class="small" x="150" y="256">breed: string</text>
  <line x1="60" y1="268" x2="240" y2="268" stroke="#2563eb" stroke-width="1"/>
  <text class="small" x="150" y="282">+ speak(): "Woof!"</text>

  <!-- Cat subclass -->
  <rect class="sub" x="270" y="210" width="180" height="90" rx="6" fill="#fce7f3" stroke="#db2777"/>
  <text class="label" x="360" y="230" fill="#db2777">Cat</text>
  <line x1="270" y1="242" x2="450" y2="242" stroke="#db2777" stroke-width="1"/>
  <text class="small" x="360" y="256">color: string</text>
  <line x1="270" y1="268" x2="450" y2="268" stroke="#db2777" stroke-width="1"/>
  <text class="small" x="360" y="282">+ speak(): "Meow!"</text>

  <!-- Bird subclass -->
  <rect x="480" y="210" width="140" height="90" rx="6" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text class="label" x="550" y="230" fill="#16a34a">Bird</text>
  <line x1="480" y1="242" x2="620" y2="242" stroke="#16a34a" stroke-width="1"/>
  <text class="small" x="550" y="256">wingspan: int</text>
  <line x1="480" y1="268" x2="620" y2="268" stroke="#16a34a" stroke-width="1"/>
  <text class="small" x="550" y="282">+ speak(): "Tweet!"</text>

  <!-- Inheritance arrows (open triangle) -->
  <line x1="150" y1="210" x2="280" y2="140" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#tri)"/>
  <line x1="360" y1="210" x2="340" y2="140" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#tri)"/>
  <line x1="550" y1="210" x2="375" y2="140" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#tri)"/>

  <text font-size="11" fill="#64748b" x="320" y="346">animal.speak() dispatches to the correct subclass method at runtime</text>
</svg>
