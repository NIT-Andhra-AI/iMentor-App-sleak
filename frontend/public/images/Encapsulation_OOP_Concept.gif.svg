<svg viewBox="0 0 640 360" width="640" height="360" xmlns="http://www.w3.org/2000/svg">
  <title>OOP Encapsulation</title>
  <style>
    .bg{fill:#f8fafc}
    text{font-family:system-ui,sans-serif;fill:#1e293b;text-anchor:middle;dominant-baseline:middle}
    .title{font-size:19px;font-weight:bold;fill:#0369a1}
    .private-zone{fill:#fee2e2;stroke:#dc2626;stroke-width:2;stroke-dasharray:6,3;rx:10}
    .public-zone{fill:#dcfce7;stroke:#16a34a;stroke-width:2;rx:10}
    .method{fill:#dbeafe;stroke:#2563eb;stroke-width:1.5;rx:4}
    .field{fill:#fef9c3;stroke:#d97706;stroke-width:1.5;rx:4}
    .small{font-size:11px}
    .bold{font-weight:bold}
    .arr{stroke:#0369a1;stroke-width:1.5;marker-end:url(#a)}
    .xarr{stroke:#dc2626;stroke-width:1.5;marker-end:url(#ax)}
  </style>
  <defs>
    <marker id="a" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto"><polygon points="0 0,7 2.5,0 5" fill="#0369a1"/></marker>
    <marker id="ax" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto"><polygon points="0 0,7 2.5,0 5" fill="#dc2626"/></marker>
  </defs>
  <rect class="bg" width="640" height="360"/>
  <text class="title" x="320" y="24">OOP Encapsulation — Public Interface vs Private State</text>

  <!-- Class outer boundary -->
  <rect x="170" y="50" width="300" height="280" rx="12" fill="#f0f9ff" stroke="#0369a1" stroke-width="2.5"/>
  <text x="320" y="70" class="bold" font-size="16" fill="#0369a1">BankAccount</text>

  <!-- Private zone -->
  <rect class="private-zone" x="185" y="85" width="270" height="120" rx="8"/>
  <text x="320" y="102" class="small bold" fill="#dc2626">🔒 PRIVATE (hidden state)</text>
  <rect class="field" x="200" y="112" width="240" height="24" rx="4"/>
  <text x="320" y="124" class="small">- balance: double = 0.0</text>
  <rect class="field" x="200" y="142" width="240" height="24" rx="4"/>
  <text x="320" y="154" class="small">- owner: String</text>
  <rect class="field" x="200" y="172" width="240" height="24" rx="4"/>
  <text x="320" y="184" class="small">- transactionLog: List</text>

  <!-- Public zone -->
  <rect class="public-zone" x="185" y="220" width="270" height="95" rx="8"/>
  <text x="320" y="238" class="small bold" fill="#16a34a">✅ PUBLIC (interface)</text>
  <rect class="method" x="200" y="248" width="240" height="22" rx="3"/>
  <text x="320" y="259" class="small">+ deposit(amount): void</text>
  <rect class="method" x="200" y="274" width="240" height="22" rx="3"/>
  <text x="320" y="285" class="small">+ withdraw(amount): boolean</text>
  <rect class="method" x="200" y="300" width="110" height="22" rx="3"/>
  <text x="255" y="311" class="small">+ getBalance()</text>

  <!-- Outside caller -->
  <rect x="30" y="235" width="110" height="44" rx="8" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="85" y="257" class="small bold">Caller</text>
  <text x="85" y="272" class="small" fill="#7c3aed">account.deposit(100)</text>

  <!-- Allowed access arrow -->
  <line class="arr" x1="140" y1="260" x2="183" y2="265"/>

  <!-- Blocked direct access -->
  <line x1="85" y1="190" x2="150" y2="160" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="75" y="185" font-size="10" fill="#dc2626">❌ Cannot access</text>
  <text x="75" y="197" font-size="10" fill="#dc2626">private fields</text>

  <text font-size="11" fill="#64748b" x="320" y="350">Data hiding: internal state is protected, only controlled via public methods</text>
</svg>
