<svg viewBox="0 0 640 360" width="640" height="360" xmlns="http://www.w3.org/2000/svg">
  <title>Max Heap — Insert &amp; Bubble Up</title>
  <style>
    .bg{fill:#f8fafc}
    text{font-family:system-ui,sans-serif;fill:#1e293b;text-anchor:middle;dominant-baseline:middle}
    .title{font-size:19px;font-weight:bold;fill:#0369a1}
    .node{fill:#dbeafe;stroke:#2563eb;stroke-width:2}
    .new-node{fill:#fef9c3;stroke:#d97706;stroke-width:2}
    .highlight{fill:#bbf7d0;stroke:#16a34a;stroke-width:2.5}
    .edge{stroke:#64748b;stroke-width:1.5;fill:none}
    .label{font-size:14px;font-weight:bold}
    .arr{fill:#0369a1}
    @keyframes insertNode{0%,15%{opacity:0;r:0}25%,100%{opacity:1;r:24}}
    @keyframes bubbleUp{0%,25%{fill:#fef9c3;stroke:#d97706}55%,100%{fill:#bbf7d0;stroke:#16a34a}}
    .ins{animation:insertNode 3s ease infinite}
    .bub{animation:bubbleUp 3s ease 0.8s infinite}
  </style>
  <rect class="bg" width="640" height="360"/>
  <text class="title" x="320" y="24">Max Heap — Insert (Bubble Up)</text>
  <text font-size="11" fill="#475569" x="320" y="42">Inserting 95 into a max heap: bubbles up to maintain heap property</text>

  <!-- Tree edges -->
  <line class="edge" x1="320" y1="90" x2="185" y2="160"/>
  <line class="edge" x1="320" y1="90" x2="455" y2="160"/>
  <line class="edge" x1="185" y1="160" x2="115" y2="230"/>
  <line class="edge" x1="185" y1="160" x2="255" y2="230"/>
  <line class="edge" x1="455" y1="160" x2="385" y2="230"/>
  <line class="edge" x1="455" y1="160" x2="525" y2="230"/>
  <!-- New node edge (dashed until inserted) -->
  <line class="edge" x1="115" y1="230" x2="80" y2="300" stroke-dasharray="5,3"/>

  <!-- Existing nodes -->
  <circle class="node" cx="320" cy="90" r="24"/>
  <text class="label" x="320" y="90">90</text>
  <circle class="node" cx="185" cy="160" r="24"/>
  <text class="label" x="185" y="160">70</text>
  <circle class="node" cx="455" cy="160" r="24"/>
  <text class="label" x="455" y="160">80</text>
  <circle class="node" cx="115" cy="230" r="24"/>
  <text class="label" x="115" y="230">50</text>
  <circle class="node" cx="255" cy="230" r="24"/>
  <text class="label" x="255" y="230">60</text>
  <circle class="node" cx="385" cy="230" r="24"/>
  <text class="label" x="385" y="230">40</text>
  <circle class="node" cx="525" cy="230" r="24"/>
  <text class="label" x="525" y="230">30</text>

  <!-- New node being inserted -->
  <circle class="new-node bub ins" cx="80" cy="300" r="24"/>
  <text class="label bub" x="80" y="300">95</text>

  <!-- Arrow label -->
  <text font-size="12" fill="#d97706" x="55" y="285">← insert</text>

  <!-- Array representation -->
  <text font-size="12" fill="#475569" x="320" y="345">Array: [90, 70, 80, 50, 60, 40, 30, 95→bubbles up]</text>
</svg>
